<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <script>
      (function () {
        try {
          if (localStorage.getItem('global-lineage-theme') === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
          }
        } catch (e) { /* ignore */ }
      })();
    </script>
    <!-- GitHub Pages /repo (no trailing slash): relative ./app.js would otherwise resolve to domain root. -->
    <script>
      (function () {
        var p = location.pathname;
        if (p === '/' || p.endsWith('/')) return;
        var seg = p.slice(p.lastIndexOf('/') + 1);
        if (seg.indexOf('.') !== -1) return;
        location.replace(p + '/' + location.search + location.hash);
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Global Lineage</title>
    <link rel="stylesheet" href="./styles.css" />

    <!-- Renderer libraries via CDN. To swap a viz framework, see docs/SWITCHING_VIZ.md. -->
    <script src="https://cdn.jsdelivr.net/npm/cytoscape@3.30.2/dist/cytoscape.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/cytoscape-dagre@2.5.0/cytoscape-dagre.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js" defer></script>
  </head>
  <body>
    <header class="app-header">
      <h1 class="app-title">Global Lineage</h1>
      <nav id="app-nav" class="app-nav" aria-label="Primary"></nav>
      <div class="header-lineage-tools">
        <button
          type="button"
          id="theme-toggle"
          class="theme-toggle"
          aria-label="Switch to light mode"
          title="Light mode"
        >
          <span class="theme-toggle-icon" aria-hidden="true"></span>
        </button>
        <script>
          (function () {
            var sun =
              '<svg class="theme-toggle-svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32l1.41 1.41M2 12h2m16 0h2M4.93 19.07l1.41-1.41m11.32-11.32l1.41-1.41"/></svg>';
            var moon =
              '<svg class="theme-toggle-svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
            var ic = document.querySelector('#theme-toggle .theme-toggle-icon');
            if (ic) {
              ic.innerHTML =
                document.documentElement.getAttribute('data-theme') === 'light' ? moon : sun;
            }
          })();
        </script>
        <label class="upload-json-label">
          <input type="file" id="lineage-file-input" accept=".json,application/json" hidden />
          <span class="btn-header secondary">Load Lineage JSON</span>
        </label>
        <select id="lineage-source-select" class="lineage-source-select" hidden title="Pick an input JSON" aria-label="Pick an input JSON"></select>
      </div>
    </header>

    <main id="page-root" class="page-root" aria-live="polite"></main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
